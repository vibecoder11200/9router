name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: vibecoder11200/9router

jobs:
  # Gate: chặn build nếu tag trỏ tới commit thiếu feature định nghĩa fork (gemini-web/ds2api).
  # Ngăn tình trạng tag vô tình trỏ sang commit upstream thuần (đã từng xảy ra với v0.5.12),
  # tránh publish image thiếu tính năng local. Checkout mặc định lấy đúng commit được tag trỏ tới.
  verify-release-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tagged commit contains fork-defining local features
        run: |
          set -e
          ok=1
          for f in open-sse/providers/registry/gemini-web.js open-sse/providers/registry/ds2api.js; do
            if [ ! -f "$f" ]; then
              echo "::error::Tag '${{ github.ref_name }}' (${{ github.sha }}) is missing $f — looks like a bare-upstream commit, not a fork release. Aborting before any image is built or pushed."
              ok=0
            else
              echo "OK: $f present at tag ${{ github.ref_name }}"
            fi
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Refusing to build: tag does not point to a fork release commit. Re-create the tag on a commit that includes gemini-web + ds2api."
            exit 1
          fi
          echo "Verified: tag ${{ github.ref_name }} -> ${{ github.sha }} is a fork release (local features present)."

  build-and-push:
    needs: verify-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tối ưu cache: dùng GHA cache để build cực nhanh
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false

  # Trigger deploy job sau khi build thành công
  trigger-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: deploy-event
          client-payload: '{"image_tag": "${{ needs.build-and-push.outputs.image_tag }}"}'
